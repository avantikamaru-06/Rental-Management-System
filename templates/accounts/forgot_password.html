{% extends "base.html" %}

{% block title %}Forgot Password - RentalPro{% endblock %}

{% block page_header %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-custom">
            <div class="card-header text-center">
                <h3 class="m-0 text-white"><i class="fa-solid fa-key text-primary me-2"></i>Reset Password</h3>
                <p class="text-muted m-0 mt-1">We will send instructions to your email</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'accounts:forgot_password' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="email" class="form-label text-muted">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                    </div>
                    
                    <button type="submit" class="btn btn-accent w-100 mb-3">Send Instructions</button>
                    
                    <div class="text-center">
                        <a href="{% url 'accounts:login' %}" class="text-primary text-decoration-none small">Remembered? Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
